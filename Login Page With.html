<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 260px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #333;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* Social Buttons */
.social {
    display: block;
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    color: white;
    text-decoration: none;
    font-size: 14px;
}

.social i {
    margin-right: 8px;
}

/* Colors */
.github { background: #24292e; }
.google { background: #db4437; }
.facebook { background: #1877f2; }
.linkedin { background: #0a66c2; }

/* Hover effect */
.social:hover {
    opacity: 0.85;
}

.message {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <!-- Social Logins -->
    <a href="https://github.com/login" target="_blank" class="social github">
        <i class="fab fa-github"></i> GitHub
    </a>

    <a href="https://accounts.google.com/" target="_blank" class="social google">
        <i class="fab fa-google"></i> Google
    </a>

    <a href="https://www.facebook.com/login" target="_blank" class="social facebook">
        <i class="fab fa-facebook-f"></i> Facebook
    </a>

    <a href="https://www.linkedin.com/login" target="_blank" class="social linkedin">
        <i class="fab fa-linkedin-in"></i> LinkedIn
    </a>

    <div class="message" id="message"></div>
</div>

<script>
function login() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    var correctUser = "admin";
    var correctPass = "1234";

    if(user === correctUser && pass === correctPass) {
        document.getElementById("message").style.color = "green";
        document.getElementById("message").innerText = "Login Successful!";
    } else {
        document.getElementById("message").style.color = "red";
        document.getElementById("message").innerText = "Invalid Username or Password";
    }
}
</script>

</body>
</html>
